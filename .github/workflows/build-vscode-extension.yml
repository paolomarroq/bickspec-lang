name: Build VS Code Extension

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: vscode-extension/package-lock.json

      - name: Build compiler JAR
        run: mvn -f app/pom.xml package

      - name: Install extension dependencies
        working-directory: vscode-extension
        run: npm ci

      - name: Verify extension source
        working-directory: vscode-extension
        run: npm run check

      - name: Prepare bundled compiler
        working-directory: vscode-extension
        run: npm run prepare:compiler

      - name: Package VSIX
        working-directory: vscode-extension
        run: npm run package:vsix

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: bickspec-vscode-extension-vsix
          path: vscode-extension/*.vsix

      - name: Upload compiler installer artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bickspec-cli-installers
          path: |
            installers/**
            vscode-extension/media/compiler/bickspec-compiler-1.0.0.jar
